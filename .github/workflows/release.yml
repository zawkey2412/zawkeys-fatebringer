name: Release

# Trigger by pushing a version tag:
#   git tag v1.0.0 && git push origin v1.0.0

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Strip leading "v" from tag ───────────────────────────────────────
      - name: Set version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── Extract this version's section from CHANGELOG.md ────────────────
      - name: Extract changelog notes
        id: changelog
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          # Grab everything between "## [X.Y.Z]" and the next "## [" or EOF
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="No changelog entry found for v$VERSION."
          fi
          # Write to a file to preserve multiline content safely
          echo "$NOTES" > release_notes.txt
          echo "NOTES_FILE=release_notes.txt" >> "$GITHUB_OUTPUT"

      # ── Stamp version into module.json ───────────────────────────────────
      - name: Stamp module.json
        run: |
          jq --arg v "${{ steps.ver.outputs.VERSION }}" '.version = $v' module.json \
            > module.tmp.json && mv module.tmp.json module.json

      # ── Build module.zip ─────────────────────────────────────────────────
      - name: Build module.zip
        run: |
          zip -r module.zip \
            module.json \
            scripts/ \
            styles/ \
            lang/ \
            templates/ \
            assets/ \
            README.md \
            CHANGELOG.md \
            --exclude "*.DS_Store" "*.log"

      # ── Create GitHub release ────────────────────────────────────────────
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Zawkey's Fatebringer v${{ steps.ver.outputs.VERSION }}"
          body_path: release_notes.txt
          files: |
            module.json
            module.zip
